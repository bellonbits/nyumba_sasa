name: Release (iOS + Android)

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

jobs:
  # ── Android APK + AAB ──────────────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Capacitor sync
        run: npx cap sync android
        env:
          NODE_ENV: production

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/nyumbasasa.keystore

      - name: Inject signing config
        run: |
          cat >> android/app/build.gradle << 'EOF'
          android {
            signingConfigs {
              release {
                storeFile file("nyumbasasa.keystore")
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
              }
            }
            buildTypes { release { signingConfig signingConfigs.release } }
          }
          EOF

      - name: Set version
        run: |
          V="${{ github.event.inputs.version_name || github.ref_name }}"
          V="${V#v}"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$V\"/" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK + AAB
        working-directory: android
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename outputs
        run: |
          V="${{ github.event.inputs.version_name || github.ref_name }}"; V="${V#v}"
          B="${{ github.run_number }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/nyumbasasa-${V}-${B}.apk
          mv android/app/build/outputs/bundle/release/app-release.aab \
             android/app/build/outputs/bundle/release/nyumbasasa-${V}-${B}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/*.aab

  # ── iOS IPA ────────────────────────────────────────────────────────────────
  ios:
    name: iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Capacitor sync
        run: npx cap sync ios
        env:
          NODE_ENV: production

      - name: Install CocoaPods
        run: cd ios/App && pod install --repo-update

      - name: Import certificate & profile
        run: |
          KP=$(openssl rand -base64 20)
          KP_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KP" $KP_PATH
          security set-keychain-settings -lut 21600 $KP_PATH
          security unlock-keychain -p "$KP" $KP_PATH
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KP_PATH
          security list-keychain -d user -s $KP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/nyumbasasa.mobileprovision
          echo "KEYCHAIN_PATH=$KP_PATH" >> $GITHUB_ENV

      - name: Set version
        run: |
          V="${{ github.event.inputs.version_name || github.ref_name }}"; V="${V#v}"
          cd ios/App
          xcrun agvtool new-marketing-version $V
          xcrun agvtool new-version -all ${{ github.run_number }}

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="nyumbasasa" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            | xcpretty

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>provisioningProfiles</key>
            <dict><key>com.nyumbasasa.app</key><string>nyumbasasa</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            | xcpretty
          V="${{ github.event.inputs.version_name || github.ref_name }}"; V="${V#v}"
          mv $RUNNER_TEMP/ipa/App.ipa $RUNNER_TEMP/ipa/nyumbasasa-${V}-${{ github.run_number }}.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/ipa/*.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true

  # ── GitHub Release (attach all artifacts) ─────────────────────────────────
  publish:
    name: Publish Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          name: "Nyumba Sasa ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
